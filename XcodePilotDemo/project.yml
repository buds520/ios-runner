name: XcodePilotDemo
options:
  bundleIdPrefix: com.xcodepilot.demo
  deploymentTarget:
    iOS: "16.0"
targets:
  XcodePilotDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.xcodepilot.demo.XcodePilotDemo
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
