# After a version tag is pushed, update buds520/extensions (Zed marketplace review PR).
name: Publish Zed Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v (e.g. 0.2.0)"
        required: true

permissions:
  contents: read

# Optional: set secret EXTENSIONS_DEPLOY_TOKEN (PAT with push to buds520/extensions).
# Without it, run ./scripts/update-zed-extensions-pr.sh locally after each release.

jobs:
  update-extensions-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Skip without deploy token
        id: gate
        env:
          EXTENSIONS_DEPLOY_TOKEN: ${{ secrets.EXTENSIONS_DEPLOY_TOKEN }}
        run: |
          if [[ -z "$EXTENSIONS_DEPLOY_TOKEN" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "EXTENSIONS_DEPLOY_TOKEN not set; skipping (run scripts/update-zed-extensions-pr.sh locally)."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        if: steps.gate.outputs.enabled == 'true'
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout ios-runner at tag
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
          fetch-depth: 0

      - name: Checkout extensions fork
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          repository: buds520/extensions
          token: ${{ secrets.EXTENSIONS_DEPLOY_TOKEN }}
          path: extensions-repo
          fetch-depth: 1

      - name: Update submodule and extensions.toml
        if: steps.gate.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: v${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          cd extensions-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin add-ios-runner-v2
          git checkout add-ios-runner-v2

          git submodule update --init extensions/ios-runner
          cd extensions/ios-runner
          git fetch origin tag "$TAG" 2>/dev/null || git fetch origin
          git checkout "$TAG"
          SHA="$(git rev-parse HEAD)"
          cd ../..

          git add extensions/ios-runner
          if grep -q '^\[ios-runner\]' extensions.toml; then
            sed -i "/^\[ios-runner\]/,/^\[/ s/^version = .*/version = \"${VERSION}\"/" extensions.toml
          else
            echo "::error::[ios-runner] missing in extensions.toml"
            exit 1
          fi
          git add extensions.toml

          if git diff --staged --quiet; then
            echo "No changes for extensions PR"
            exit 0
          fi

          git commit -m "chore(ios-runner): bump to ${VERSION} (${SHA:0:7})"
          git push origin add-ios-runner-v2

      - name: Comment on marketplace PR
        if: steps.gate.outputs.enabled == 'true' && vars.ZED_EXTENSIONS_PR != ''
        env:
          GH_TOKEN: ${{ secrets.EXTENSIONS_DEPLOY_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: v${{ steps.ver.outputs.version }}
        run: |
          SHA="$(git -C extensions-repo/extensions/ios-runner rev-parse HEAD)"
          BODY="$(cat <<EOF
          <!-- ios-runner-release-update -->
          ## iOS-Runner ${VERSION}

          - Submodule: \`${SHA}\` ([release ${TAG}](https://github.com/buds520/ios-runner/releases/tag/${TAG}))
          - Marketplace \`extensions.toml\` version: \`${VERSION}\`

          _Updated by [ios-runner publish workflow](https://github.com/buds520/ios-runner/actions)._
          EOF
          )"
          PR_NUMBER="${{ vars.ZED_EXTENSIONS_PR }}"
          COMMENT_ID="$(gh api "repos/zed-industries/extensions/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- ios-runner-release-update -->")) | .id' \
            | tail -n 1 || true)"
          if [[ -n "$COMMENT_ID" ]]; then
            gh api --method PATCH "repos/zed-industries/extensions/issues/comments/${COMMENT_ID}" \
              -f body="$BODY" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --repo zed-industries/extensions --body "$BODY"
          fi
