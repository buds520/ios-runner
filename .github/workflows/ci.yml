name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Format
        working-directory: crates
        run: cargo fmt --check

      - name: Check extension embeds
        run: ./scripts/sync-extension-embeds.sh --check

      - name: Test
        working-directory: crates
        run: cargo test --workspace

      - name: Clippy
        working-directory: crates
        run: cargo clippy --workspace --all-targets -- -D warnings
