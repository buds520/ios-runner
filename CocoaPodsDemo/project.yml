name: CocoaPodsDemo
options:
  bundleIdPrefix: com.iosrunner.demo
  deploymentTarget:
    iOS: "16.0"
targets:
  CocoaPodsDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.iosrunner.demo.CocoaPodsDemo
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
